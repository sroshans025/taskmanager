<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Task Manager</title>
    <style>
:root {
    --primary-color: #6366f1;
    --primary-hover: #4f46e5;
    --bg-color: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --danger-color: #ef4444;
    --success-color: #10b981;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: var(--bg-color);
    background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
}

.app-container {
    width: 100%;
    max-width: 600px;
    padding: 20px;
}

.glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.5s ease-out forwards;
}

.hidden {
    display: none !important;
}

.glow-text {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 30px;
    background: linear-gradient(to right, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}

/* Tabs */
.tabs {
    display: flex;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--glass-border);
}

.tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 10px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
}

.tab-btn.active {
    color: var(--text-primary);
    font-weight: 600;
}

.tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 2px;
    background: var(--primary-color);
    box-shadow: 0 0 10px var(--primary-color);
}

/* Forms */
.auth-form {
    display: none;
    flex-direction: column;
    gap: 20px;
}

.auth-form.active {
    display: flex;
    animation: slideUp 0.4s ease-out;
}

.input-group {
    position: relative;
}

.input-group input {
    width: 100%;
    padding: 15px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
}

.input-group input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
}

.input-group label {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
    transition: 0.3s ease all;
}

.input-group input:focus ~ label,
.input-group input:not(:placeholder-shown) ~ label {
    top: 0;
    font-size: 0.8rem;
    background: var(--bg-color);
    padding: 0 5px;
    color: var(--primary-color);
}

.btn {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.primary-btn {
    background: var(--primary-color);
    color: white;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}

.primary-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
}

.primary-btn:active {
    transform: translateY(0);
}

.outline-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
}

.outline-btn:hover {
    background: rgba(255, 255, 255, 0.1);
}

.error-msg {
    color: var(--danger-color);
    font-size: 0.9rem;
    text-align: center;
    min-height: 20px;
}

/* Dashboard */
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.dashboard-header h2 {
    font-weight: 600;
    color: var(--text-primary);
}

#task-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 30px;
}

#task-form input {
    width: 100%;
    padding: 15px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text-primary);
    outline: none;
}

#task-form input:focus {
    border-color: var(--primary-color);
}

.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.filter-btn {
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-secondary);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s;
}

.filter-btn.active, .filter-btn:hover {
    background: var(--primary-color);
    color: white;
    border-color: var(--primary-color);
}

.task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.task-item {
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s ease;
    animation: slideIn 0.3s ease-out;
}

.task-item:hover {
    transform: translateX(5px);
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.05);
}

.task-item.completed {
    opacity: 0.6;
}

.task-item.completed .task-title {
    text-decoration: line-through;
    color: var(--text-secondary);
}

.task-content {
    flex: 1;
}

.task-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 5px;
    transition: color 0.3s;
}

.task-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
}

.task-actions {
    display: flex;
    gap: 10px;
}

.icon-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.icon-btn.complete-btn {
    color: var(--success-color);
    border: 1px solid var(--success-color);
}

.icon-btn.complete-btn:hover {
    background: rgba(16, 185, 129, 0.2);
}

.icon-btn.delete-btn {
    color: var(--danger-color);
    border: 1px solid var(--danger-color);
}

.icon-btn.delete-btn:hover {
    background: rgba(239, 68, 68, 0.2);
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

/* Checkmark and Trash Icons using CSS/SVG for Vanilla JS */
.check-icon::before { content: '✓'; font-weight: bold; }
.trash-icon::before { content: '✕'; font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Auth Section -->
        <div id="auth-section" class="glass-panel">
            <h1 class="glow-text">Task Manager</h1>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <input type="text" id="login-username" required placeholder=" ">
                    <label for="login-username">Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" required placeholder=" ">
                    <label for="login-password">Password</label>
                </div>
                <button type="submit" class="btn primary-btn">Login</button>
                <div id="login-error" class="error-msg"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <input type="text" id="reg-username" required placeholder=" ">
                    <label for="reg-username">Username</label>
                </div>
                <div class="input-group">
                    <input type="email" id="reg-email" required placeholder=" ">
                    <label for="reg-email">Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-password" required placeholder=" ">
                    <label for="reg-password">Password</label>
                </div>
                <button type="submit" class="btn primary-btn">Register</button>
                <div id="reg-error" class="error-msg"></div>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard-section" class="glass-panel hidden">
            <header class="dashboard-header">
                <h2>My Tasks</h2>
                <button id="logout-btn" class="btn outline-btn">Logout</button>
            </header>

            <div class="task-input-area">
                <form id="task-form">
                    <input type="text" id="task-title" required placeholder="What needs to be done?">
                    <input type="text" id="task-desc" placeholder="Description (optional)">
                    <button type="submit" class="btn primary-btn">Add Task</button>
                </form>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="task-list" class="task-list">
                <!-- Tasks will be injected here -->
            </ul>
        </div>
    </div>

    <script>
const API_URL = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000/api' : '/api';

// DOM Elements
const authSection = document.getElementById('auth-section');
const dashboardSection = document.getElementById('dashboard-section');
const loginForm = document.getElementById('login-form');
const registerForm = document.getElementById('register-form');
const taskForm = document.getElementById('task-form');
const taskList = document.getElementById('task-list');
const logoutBtn = document.getElementById('logout-btn');
const filterBtns = document.querySelectorAll('.filter-btn');

// State
let token = localStorage.getItem('token');
let currentFilter = 'all';

// Initialization
function init() {
    if (token) {
        showDashboard();
        fetchTasks();
    } else {
        showAuth();
    }
}

// UI Toggles
function showAuth() {
    authSection.classList.remove('hidden');
    dashboardSection.classList.add('hidden');
}

function showDashboard() {
    authSection.classList.add('hidden');
    dashboardSection.classList.remove('hidden');
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
    
    if (tab === 'login') {
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
        loginForm.classList.add('active');
    } else {
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
        registerForm.classList.add('active');
    }
}

// API Calls
async function apiCall(endpoint, method = 'GET', body = null, isAuthForm = false) {
    const headers = {};
    if (!isAuthForm && token) {
        headers['Authorization'] = `Bearer ${token}`;
    }

    let options = { method, headers };

    if (body) {
        if (isAuthForm && method === 'POST' && endpoint === '/auth/login') {
            options.body = new URLSearchParams(body);
            headers['Content-Type'] = 'application/x-www-form-urlencoded';
        } else {
            options.body = JSON.stringify(body);
            headers['Content-Type'] = 'application/json';
        }
    }

    try {
        const response = await fetch(`${API_URL}${endpoint}`, options);
        if (response.status === 401 && !isAuthForm) {
            handleLogout();
            throw new Error('Unauthorized');
        }
        
        const data = response.status === 204 ? null : await response.json();
        
        if (!response.ok) {
            let errorMsg = data?.detail;
            if (Array.isArray(errorMsg)) {
                errorMsg = errorMsg.map(e => e.msg).join(', ');
            }
            throw new Error(errorMsg || 'An error occurred');
        }
        return data;
    } catch (error) {
        throw error;
    }
}

// Auth Logic
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const errorDiv = document.getElementById('login-error');

    try {
        const data = await apiCall('/auth/login', 'POST', { username, password }, true);
        token = data.access_token;
        localStorage.setItem('token', token);
        errorDiv.textContent = '';
        loginForm.reset();
        showDashboard();
        fetchTasks();
    } catch (error) {
        errorDiv.textContent = error.message;
    }
});

registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('reg-username').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const errorDiv = document.getElementById('reg-error');

    try {
        await apiCall('/auth/register', 'POST', { username, email, password });
        errorDiv.textContent = '';
        registerForm.reset();
        switchTab('login');
        // Pre-fill login
        document.getElementById('login-username').value = username;
        document.getElementById('login-password').focus();
    } catch (error) {
        errorDiv.textContent = error.message;
    }
});

function handleLogout() {
    token = null;
    localStorage.removeItem('token');
    showAuth();
}

logoutBtn.addEventListener('click', handleLogout);

// Task Logic
async function fetchTasks() {
    try {
        let endpoint = '/tasks/';
        if (currentFilter === 'active') endpoint += '?completed=false';
        if (currentFilter === 'completed') endpoint += '?completed=true';
        
        const tasks = await apiCall(endpoint);
        renderTasks(tasks);
    } catch (error) {
        console.error('Error fetching tasks:', error);
    }
}

function renderTasks(tasks) {
    taskList.innerHTML = '';
    
    if (tasks.length === 0) {
        taskList.innerHTML = `<li class="task-item" style="justify-content: center; color: var(--text-secondary);">No tasks found.</li>`;
        return;
    }

    tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `task-item ${task.completed ? 'completed' : ''}`;
        
        li.innerHTML = `
            <div class="task-content">
                <div class="task-title">${escapeHTML(task.title)}</div>
                ${task.description ? `<div class="task-desc">${escapeHTML(task.description)}</div>` : ''}
            </div>
            <div class="task-actions">
                <button class="icon-btn complete-btn" onclick="toggleTaskStatus(${task.id}, ${task.completed})" title="Toggle Status">
                    <span class="check-icon"></span>
                </button>
                <button class="icon-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete Task">
                    <span class="trash-icon"></span>
                </button>
            </div>
        `;
        taskList.appendChild(li);
    });
}

taskForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('task-title').value;
    const description = document.getElementById('task-desc').value;

    try {
        await apiCall('/tasks/', 'POST', { title, description });
        taskForm.reset();
        fetchTasks();
    } catch (error) {
        console.error('Error creating task:', error);
    }
});

window.toggleTaskStatus = async (id, currentStatus) => {
    try {
        await apiCall(`/tasks/${id}`, 'PUT', { completed: !currentStatus });
        fetchTasks();
    } catch (error) {
        console.error('Error updating task:', error);
    }
};

window.deleteTask = async (id) => {
    if(!confirm("Are you sure you want to delete this task?")) return;
    try {
        await apiCall(`/tasks/${id}`, 'DELETE');
        fetchTasks();
    } catch (error) {
        console.error('Error deleting task:', error);
    }
};

// Filter Logic
filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        fetchTasks();
    });
});

// Utility
function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
        }[tag] || tag)
    );
}

// Start
init();
    </script>
</body>
</html>
